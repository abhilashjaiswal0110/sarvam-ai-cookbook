services:
  rural-bank-onboarding:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      streamlit run usecases/rural_bank_onboarding/app.py
      --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    restart: unless-stopped

